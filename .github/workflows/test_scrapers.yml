name: Kontrio — Tests

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Que tester ?"
        required: true
        default: "connexion"
        type: choice
        options:
          - connexion
          - apis_sources_donnees
          - sites_fournisseurs
          - sites_mazout
          - donnees_en_base
          - tout

jobs:
  test:
    name: "${{ github.event.inputs.test }}"
    runs-on: ubuntu-latest

    steps:

      # ══════════════════════════════════════════════
      # TOUJOURS : Connexion Supabase
      # ══════════════════════════════════════════════
      - name: "Connexion Supabase"
        run: |
          echo "━━━ CONNEXION SUPABASE ━━━"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/fournisseurs?select=nom&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          if [ "$CODE" = "200" ]; then
            echo "✅ Supabase OK (HTTP $CODE)"
          else
            echo "❌ Supabase inaccessible (HTTP $CODE)"
            echo "→ Vérifie les secrets SUPABASE_URL et SUPABASE_SERVICE_KEY"
            exit 1
          fi

      # ══════════════════════════════════════════════
      # TEST : APIs sources de données officielles
      # Ce sont les sources que le PC va scraper
      # ══════════════════════════════════════════════
      - name: "APIs sources de données"
        if: github.event.inputs.test == 'apis_sources_donnees' || github.event.inputs.test == 'tout'
        run: |
          echo ""
          echo "━━━ APIs SOURCES DE DONNÉES ━━━"
          echo "Ces APIs seront appelées par les scripts Python sur ton PC"
          echo ""

          check() {
            local NOM="$1" URL="$2"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "User-Agent: Mozilla/5.0 Chrome/122.0" "$URL")
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "  ✅ $NOM (HTTP $CODE)"
            else
              echo "  ❌ $NOM (HTTP $CODE) — le script PC devra gérer ce cas"
            fi
          }

          echo "--- Prix spot électricité ---"
          check "Elia ODS034 (SDAC day-ahead prices)" \
            "https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods034/records?limit=1&select=datetime,price"
          check "Elia ODS032 (backup prix)" \
            "https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods032/records?limit=1&select=datetime,price"

          echo ""
          echo "--- Contenu réel Elia ODS034 ---"
          BODY=$(curl -s --max-time 15 \
            "https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods034/records?limit=3&order_by=datetime+desc&select=datetime,price")
          echo "$BODY" | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            r = d.get('results', [])
            if r:
              print(f'  ✅ {len(r)} prix reçus')
              for x in r[:3]:
                print(f'     {str(x.get(\"datetime\",\"?\"))[:16]} → {x.get(\"price\",\"?\")} EUR/MWh')
            else:
              print(f'  ⚠️  Réponse vide — dataset peut être temporairement indisponible')
          except Exception as e:
            print(f'  ❌ Erreur : {e}')
          " || true

          echo ""
          echo "--- Données marché avancées ---"
          check "AGSI stockage gaz Europe" "https://agsi.gie.eu/api?type=EU"
          check "Elia nucléaire ODS029" \
            "https://opendata.elia.be/api/explore/v2.1/catalog/datasets/ods029/records?limit=1"

          echo ""
          echo "--- Météo par commune ---"
          check "Open-Meteo Bruxelles (1000)" \
            "https://api.open-meteo.com/v1/forecast?latitude=50.8503&longitude=4.3517&daily=temperature_2m_mean&forecast_days=3&timezone=Europe/Brussels"
          check "Open-Meteo Liège (4000)" \
            "https://api.open-meteo.com/v1/forecast?latitude=50.6326&longitude=5.5797&daily=temperature_2m_mean&forecast_days=3&timezone=Europe/Brussels"
          check "Open-Meteo Namur (5000)" \
            "https://api.open-meteo.com/v1/forecast?latitude=50.4669&longitude=4.8675&daily=temperature_2m_mean&forecast_days=3&timezone=Europe/Brussels"

          echo ""
          echo "--- Contenu météo réel ---"
          curl -s --max-time 10 \
            "https://api.open-meteo.com/v1/forecast?latitude=50.8503&longitude=4.3517&daily=temperature_2m_mean&forecast_days=3&timezone=Europe/Brussels" \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          dates = d['daily']['time']
          temps = d['daily']['temperature_2m_mean']
          print('  Bruxelles — 3 prochains jours :')
          for i in range(min(3, len(dates))):
            djc = max(0, 15 - temps[i])
            print(f'  {dates[i]} : {temps[i]}°C | DJC chauffage : {djc:.1f}')
          " || true

          echo ""
          echo "--- Comparateurs officiels ---"
          check "VREG V-test (Flandre)" "https://vtest.vreg.be"
          check "CompaCWaPE (Wallonie)" "https://www.compacwape.be"
          check "BRUGEL (Bruxelles)" "https://brugel.brussels"
          check "CREG (fédéral)" "https://www.creg.be"

      # ══════════════════════════════════════════════
      # TEST : Sites fournisseurs (pages tarifaires)
      # ══════════════════════════════════════════════
      - name: "Sites fournisseurs"
        if: github.event.inputs.test == 'sites_fournisseurs' || github.event.inputs.test == 'tout'
        run: |
          echo ""
          echo "━━━ SITES FOURNISSEURS ━━━"
          echo "Pages tarifaires publiques — scraping PC Belgique"
          echo ""

          check_fournisseur() {
            local NOM="$1" URL="$2"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0 Safari/537.36" \
              -H "Accept-Language: fr-BE,fr;q=0.9" \
              -H "Referer: https://www.google.be/" \
              "$URL")
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "  ✅ $NOM (HTTP $CODE)"
            else
              echo "  ❌ $NOM (HTTP $CODE)"
            fi
          }

          echo "--- Pages tarifs électricité ---"
          check_fournisseur "Engie tarifs" \
            "https://www.engie.be/fr/particuliers/electricite-gaz/tarifs/"
          check_fournisseur "Luminus offres" \
            "https://www.luminus.be/fr/particuliers/offres/electricite"
          check_fournisseur "Bolt énergie" \
            "https://www.bolt.eu/be/fr/energy/"
          check_fournisseur "Mega électricité" \
            "https://www.mega.be/fr/electricite"
          check_fournisseur "TotalEnergies tarifs" \
            "https://www.totalenergies.be/fr/particuliers/electricite-gaz/tarifs"
          check_fournisseur "Octa+ tarifs" \
            "https://www.octaplus.be/fr/electricite/tarifs"
          check_fournisseur "Ecopower tarifs" \
            "https://www.ecopower.be/fr/tarifs-electricite"

          echo ""
          echo "--- Pages tarifs gaz ---"
          check_fournisseur "Engie gaz" \
            "https://www.engie.be/fr/particuliers/electricite-gaz/tarifs/"
          check_fournisseur "Luminus gaz" \
            "https://www.luminus.be/fr/particuliers/offres/gaz"
          check_fournisseur "TotalEnergies gaz" \
            "https://www.totalenergies.be/fr/particuliers/electricite-gaz/tarifs"

          echo ""
          echo "--- Pages tarifs injection PV ---"
          check_fournisseur "Engie injection PV" \
            "https://www.engie.be/fr/particuliers/electricite-solaire/tarif-injection/"
          check_fournisseur "Luminus injection PV" \
            "https://www.luminus.be/fr/particuliers/energie-verte/panneaux-solaires"

          echo ""
          echo "--- Cartes tarifaires PDF (vérification existence) ---"
          echo "  Note: les PDFs seront téléchargés et analysés par Claude Vision sur le PC"
          check_fournisseur "Engie carte tarifaire" \
            "https://www.engie.be/fr/particuliers/electricite-gaz/tarifs/"
          check_fournisseur "Luminus carte tarifaire" \
            "https://www.luminus.be/fr/particuliers/offres/electricite"

      # ══════════════════════════════════════════════
      # TEST : Sites mazout
      # ══════════════════════════════════════════════
      - name: "Sites mazout"
        if: github.event.inputs.test == 'sites_mazout' || github.event.inputs.test == 'tout'
        run: |
          echo ""
          echo "━━━ SITES PRIX MAZOUT ━━━"
          echo ""

          check() {
            local NOM="$1" URL="$2"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/122.0.0.0" \
              "$URL")
            [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ] \
              && echo "  ✅ $NOM (HTTP $CODE)" \
              || echo "  ❌ $NOM (HTTP $CODE)"
          }

          check "SPF Économie (prix officiel)" \
            "https://economie.fgov.be/fr/themes/energie/prix-de-lenergie/prix-maximum-des-produits/tarif-officiel-des-produits"
          check "Carbu.com (prix max)" \
            "https://carbu.com/belgique/prixmaximum"
          check "Mazout-on-line.be" \
            "https://www.mazout-on-line.be/fr/prix-du-mazout-en-belgique/"
          check "Groupasol.com" \
            "https://groupasol.com/fr/mazout/achat-immediat"
          check "In4fuels.be" \
            "https://in4fuels.be/fr/tools/prix-combustibles"

          echo ""
          echo "--- Données mazout actuelles en base ---"
          curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/prix_mazout?select=date_prix,prix_officiel_max,conseil_achat,tendance&order=date_prix.desc&limit=3" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
          | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data:
            print(f'  ✅ {len(data)} entrées en base :')
            for d in data:
              print(f'  {d[\"date_prix\"]} → {d[\"prix_officiel_max\"]} EUR/L | {d[\"tendance\"]} | conseil: {d[\"conseil_achat\"]}')
          else:
            print('  ⚠️  Aucune donnée mazout en base')
          " || true

      # ══════════════════════════════════════════════
      # TEST : Données en base
      # ══════════════════════════════════════════════
      - name: "Données en base"
        if: github.event.inputs.test == 'donnees_en_base' || github.event.inputs.test == 'tout'
        run: |
          echo ""
          echo "━━━ DONNÉES EN BASE ━━━"
          echo ""

          count() {
            local TABLE="$1" MIN="$2" LABEL="$3"
            N=$(curl -s \
              "${{ secrets.SUPABASE_URL }}/rest/v1/$TABLE?select=*&limit=1" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Prefer: count=exact" -I 2>/dev/null \
              | grep -i "content-range" | sed 's/.*\///' | tr -d '[:space:]\r')
            N="${N:-0}"
            if [ "$N" -ge "$MIN" ] 2>/dev/null; then
              echo "  ✅ $LABEL : $N lignes"
            else
              echo "  ❌ $LABEL : $N lignes (attendu ≥ $MIN)"
            fi
          }

          echo "--- Données statiques (peuplées au démarrage) ---"
          count fournisseurs 10 "Fournisseurs belges"
          count tarifs_reseau 10 "Tarifs réseau Fluvius/Ores/Sibelga"
          count contexte_reglementaire 5 "Contexte réglementaire TVA/cotisations"
          count primes_renovation 10 "Primes rénovation régionales"
          count sources_collecte 5 "Sources de données (traçabilité légale)"
          count codes_postaux_belgique 20 "Codes postaux GPS (météo par commune)"
          count offres_marche 20 "Offres marché (seed initial)"
          count prix_mazout 1 "Prix mazout"

          echo ""
          echo "--- Données à remplir depuis le PC Belgique ---"
          count prix_spot_marche 1 "Prix spot électricité (script PC)"
          count donnees_marche_avancees 1 "Données avancées marché (script PC)"
          count cartes_tarifaires 0 "Cartes tarifaires PDF (script PC)"
          count historique_prix_marche 0 "Historique prix (script PC)"

          echo ""
          echo "--- Pipeline clients (vide = normal avant lancement) ---"
          count prospects 0 "Prospects"
          count utilisateurs 0 "Utilisateurs"
          count contrats_energie 0 "Contrats suivis"
          count alertes 0 "Alertes envoyées"
          count jobs_veille 0 "Jobs exécutés"

          echo ""
          echo "--- Fraîcheur données critiques ---"
          curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/prix_spot_marche?select=date_heure,prix_eur_mwh&order=date_heure.desc&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
          | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          d = json.load(sys.stdin)
          if d:
            dt = datetime.fromisoformat(d[0]['date_heure'].replace('Z','+00:00'))
            age = (datetime.now(timezone.utc) - dt).total_seconds() / 3600
            i = '✅' if age < 4 else '⚠️' if age < 12 else '❌'
            print(f'  {i} Prix spot : {d[0][\"prix_eur_mwh\"]} EUR/MWh ({age:.1f}h)')
          else:
            print('  ⚠️  Prix spot : aucune donnée — sera rempli par le PC')
          " || true

      # ══════════════════════════════════════════════
      # RÉSUMÉ
      # ══════════════════════════════════════════════
      - name: "Résumé"
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Test       : ${{ github.event.inputs.test }}"
          echo "Résultat   : ${{ job.status }}"
          echo "Date       : $(date '+%d/%m/%Y %H:%M UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ OK          — fonctionne, rien à faire"
          echo "⚠️  Avertissement — surveiller, pas bloquant"
          echo "❌ Erreur      — à corriger"
          echo ""
          echo "Rappel architecture :"
          echo "  Scripts PC → collecte données → Supabase REST API"
          echo "  GitHub Actions → tests uniquement, jamais de collecte"
